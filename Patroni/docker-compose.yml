version: '3.9'

services:
  etcd:
    image: quay.io/coreos/etcd:v3.4.33
    container_name: etcd-dcs
    command: etcd --name etcd0 --listen-client-urls http://0.0.0.0:2379 --advertise-client-urls http://etcd:2379
    ports:
      - "2379:2379"

  patroni1:
    build: .
    container_name: patroni-node-1
    hostname: patroni1
    environment:
      - PATRONI_NAME=patroni1
      - PATRONI_POSTGRESQL_CONNECT_ADDRESS=patroni1:5432
      - PATRONI_RESTAPI_CONNECT_ADDRESS=patroni1:8008
    ports:
      - "5433:5432"
      - "8009:8008"
    depends_on:
      - etcd

  patroni2:
    build: .
    container_name: patroni-node-2
    hostname: patroni2
    environment:
      - PATRONI_NAME=patroni2
      - PATRONI_POSTGRESQL_CONNECT_ADDRESS=patroni2:5432
      - PATRONI_RESTAPI_CONNECT_ADDRESS=patroni2:8008
    ports:
      - "5434:5432"
      - "8010:8008"
    depends_on:
      - etcd
