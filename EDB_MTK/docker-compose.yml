version: '3.9'

services:
  mysql-source:
    image: mysql:8.0
    container_name: mysql-source
    environment:
      - MYSQL_ROOT_PASSWORD=rootpass
    ports:
      - "3307:3306"
    volumes:
      - ./init-source.sql:/docker-entrypoint-initdb.d/init-source.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpass"]
      timeout: 5s
      retries: 5

  postgres-target:
    image: postgres:16-bookworm
    container_name: postgres-target
    environment:
      - POSTGRES_DB=targetdb
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgrespass
    ports:
      - "5435:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d targetdb"]
      timeout: 5s
      retries: 5

  mtk-runner:
    build: .
    container_name: mtk-runner
    depends_on:
      mysql-source:
        condition: service_healthy
      postgres-target:
        condition: service_healthy
